<audio id="audio_c"></audio>
<div class="card-container">
    <div class="a_line">
        <div class="back_yinbiao">
            <img alt="S" class="yinbiao_img" src="_us4.png" />
            <div class="us" style="font-size: 1rem">{{US音标}}</div>
        </div>
        <div class="back_yinbiao">
            <img alt="K" class="yinbiao_img" src="_uk4.png" />
            <div class="uk" style="font-size: 1rem">{{UK音标}}</div>
        </div>
    </div>
    <div class="back_word_div">
        <div id="back_word_dc">
            <div id="back_syllable">{{语音音节}}</div>
            <div id="back_word">{{单词}}</div>
        </div>
        <div class="back_word_phonetic">{{单词音频}}</div>
    </div>
    <div id="definition">{{单词释义}}</div>
    <div id="synonym">{{同义词}}</div>

    <hr />
    {{#易混词}}
    <div id="homophones">{{易混词}}</div>
    <script>
        if (document.getElementById("homophones")) {
            var hintDiv = document.getElementById("homophones");
            hintDiv.addEventListener("click", function () {
                this.classList.toggle("revealed");
            });
        }
    </script>
    <style>
        #homophones {
            background-color: #e8e8e8;
            color: #e8e8e8;
            border-radius: 4px;
            padding: 0 5px;
            cursor: pointer;
            display: inline-block;
            transition: all 0.2s ease;
        }

        #homophones:hover {
            background-color: #d0d0d0;
            color: #d0d0d0;
        }

        #homophones.revealed {
            background-color: transparent;
            color: #1565c0;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: text;
        }

        .nightMode #homophones {
            background-color: #3a3a3a;
            color: #3a3a3a;
        }

        .nightMode #homophones:hover {
            background-color: #555;
            color: #555;
        }

        .nightMode #homophones.revealed {
            background-color: transparent;
            color: #2979ff; /* 夜间模式：深邃电光蓝 */
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
    {{/易混词}}

    <div class="locat">重要性：{{重要程度}}；《{{所在组}} - {{序号}}》</div>
    <div class="back_center_screen">
        <div id="back_a_sentence">{{例句翻译}}</div>
        <div id="back_q_sentence">{{例句}}</div>
        <div id="synonym_phrases_card">
            <span id="synonym_phrases">{{同义句}}</span>
            <span id="synonym_trans">{{同义句翻译}}</span>
        </div>
    </div>
</div>

<script>
    var isPlaying = false;
    function play_q() {
        var audio = document.getElementById("audio_c");
        audio.setAttribute("src", `{{例句音频U}}`);
        if (isPlaying) {
            audio.pause();
        }
        audio.play();
        isPlaying = true;
    }
    $("#back_q_sentence").off("click.play_q").on("click.play_q", play_q);
    $(document)
        .off("keydown.play_q")
        .on("keydown.play_q", function (e) {
            if (e.code === "Backslash") {
                play_q();
            }
        });
</script>
<script>
    var show_trans = false;
    var synonym_trans = document.getElementById("synonym_trans");
    synonym_trans.style.display = "none";
    $("#synonym_phrases_card").on("click", () => {
        if (show_trans) {
            synonym_trans.style.display = "none";
        } else {
            synonym_trans.style.display = "inline-block";
        }
        show_trans = !show_trans;
    });
</script>
<script>
    var show_syllable = true;
    var back_word = document.getElementById("back_word");
    var back_syllable = document.getElementById("back_syllable");
    back_word.style.display = "none";
    back_syllable.style.display = "inline-block";
    function play_s() {
        if (back_syllable.innerText.trim() === "") {
            return;
        }
        if (show_syllable) {
            back_word.style.display = "inline-block";
            back_syllable.style.display = "none";
        } else {
            back_word.style.display = "none";
            back_syllable.style.display = "inline-block";
        }
        show_syllable = !show_syllable;
    }
    $("#back_word_dc").off("click.play_s").on("click.play_s", play_s);
    $(document)
        .off("keydown.play_s")
        .on("keydown.play_s", (e) => {
            if (e.code === "BracketRight") {
                play_s();
            }
        });
</script>

<style>

        max-width: 550px;
        margin: 10px auto;
    }

    /* --- 基础布局保留 --- */
    .back_yinbiao {
        display: flex;
        align-items: center;
    }

    .back_yinbiao img {
        padding-right: 5px;
        width: 14px;
    }

    .a_line {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-left: 0px;
        margin-top: 5px;
        margin-bottom: 5px;
        opacity: 0.4;
        color: #555;
    }

    .a_line div {
        font-size: 20px;
    }

    .back_word_div {
        text-align: left;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
    }

    /* --- 核心单词样式：深海蓝主题 --- */
    #back_word_dc {
        cursor: pointer;
        display: inline-block;
        font-size: 1.8rem;
        font-weight: bold;
        color: #1565c0; /* 日间：深海蓝 */
        border: 2px solid rgba(21, 101, 192, 0.3);
        border-radius: 8px;
        box-sizing: border-box;
        padding: 0 5px;
        margin-top: 0;
        margin-bottom: 0;
        opacity: 0.5;
    }

    .back_word_phonetic {
        margin-top: 0;
        margin-bottom: 0;
    }

    /* --- 辅助信息弱化：统一灰色调 --- */
    #definition {
        opacity: 0.7;
        font-size: 0.8rem;
        text-align: left;
        color: #444;
    }

    #definition b {
        font-weight: normal !important;
    }

    .back_center_screen {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 50vh;
        flex-direction: column;
        font-size: 24px;
    }

    #synonym_phrases_card {
        font-size: 0.8rem;
        color: #888;
        text-align: left;
        opacity: 0.4;
        word-wrap: break-word;
        hyphens: auto;
        -webkit-hyphens: auto;
    }

    #synonym {
        font-size: 0.8rem;
        color: #555;
        opacity: 0.4;
    }

    /* --- 例句样式 --- */
    #back_q_sentence {
        cursor: pointer;
        text-align: center;
        word-wrap: break-word;
        hyphens: auto;
        -webkit-hyphens: auto;
        color: #555;
    }

    /* --- 核心高亮：唯一的视觉焦点 --- */
    #back_q_sentence b {
        color: #1565c0; /* 日间：深海蓝 */
    }

    #back_q_sentence:hover {
        color: #1b9eeb;
    }

    #back_a_sentence {
        opacity: 0.3;
        text-align: center;
        font-size: 1rem;
    }

    .locat {
        font-size: 0.7rem;
        text-align: right;
        margin: 0.6rem 0;
        color: #888;
        opacity: 0.5;
    }

    /* --- 播放按钮保留原样 --- */
    .replay-button svg {
        width: 25px;
        height: 25px;
    }

    .replay-button svg circle {
        display: none;
        fill: #fff;
    }

    .replay-button svg path {
        stroke: #56fcfc;
        fill: #56fcfc;
    }

    /* --- 夜间模式适配 --- */
    .nightMode .a_line {
        color: #aaa;
    }

    /* 夜间模式单词：深邃电光蓝 + 微光晕 */
    .nightMode #back_word_dc {
        color: #2979ff;
        border-color: rgba(41, 121, 255, 0.4);
        text-shadow: 0 0 4px rgba(41, 121, 255, 0.3);
    }

    .nightMode #definition {
        color: #ccc;
    }

    .nightMode #synonym {
        color: #aaa;
    }

    .nightMode #synonym_phrases_card {
        color: #aaa;
    }

    .nightMode .locat {
        color: #aaa;
    }

    .nightMode #back_q_sentence {
        color: #ccc;
    }

    /* 夜间高亮：深邃电光蓝 + 微光晕，印象深刻 */
    .nightMode #back_q_sentence b {
        color: #2979ff;
        text-shadow: 0 0 4px rgba(41, 121, 255, 0.3);
    }
</style>
